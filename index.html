<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Multi-Stage Tycoon</title>
    <style>
        /* Base setup to lock scroll behavior to the container instead of the whole screen */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #0f0f12; 
            color: #e1e1e6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fixed viewport app container */
        .app-window {
            width: 100%;
            max-width: 550px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #19191c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-left: 1px solid #29292e;
            border-right: 1px solid #29292e;
            box-sizing: border-box;
        }

        /* Top Header Stats Banner */
        .header-panel {
            padding: 20px 25px 15px 25px;
            background: #1d1d22;
            border-bottom: 2px solid #29292e;
        }
        h1 { color: #00ff88; font-size: 2.2rem; margin: 0 0 5px 0; }
        .tagline { color: #8f8f98; margin: 0 0 15px 0; font-size: 0.9rem; }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-box {
            background: #121214;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #222226;
            text-align: center;
        }
        .stat-box.full { grid-column: span 2; }
        .stat { font-size: 1.9rem; font-weight: bold; color: #ffffff; }
        .stat-lbl { font-size: 0.75rem; color: #8f8f98; text-transform: uppercase; letter-spacing: 1px; }
        .sub-stat { font-size: 1rem; color: #00ff88; font-weight: bold; }
        .rebirth-stat { color: #a33eff; font-size: 1.2rem; font-weight: bold; }

        /* Middle SCROLLABLE panel for upgrades and buttons */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px 25px;
            box-sizing: border-box;
        }

        /* Action Buttons styling */
        button { 
            background: #00ff88; 
            color: #121214; 
            border: none; 
            padding: 14px; 
            font-size: 1rem; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.15s ease; 
            margin: 6px 0; 
            width: 100%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        button:hover:not(:disabled) { 
            background: #00cc76; 
            transform: translateY(-1px); 
        }
        button:disabled { 
            background: #222226; 
            color: #575761; 
            cursor: not-allowed; 
        }
        
        .click-btn { background: #ffffff; color: #121214; justify-content: center; font-size: 1.1rem; margin-bottom: 15px; }
        .click-btn:hover:not(:disabled) { background: #e1e1e6; }
        
        .rebirth-btn { background: #a33eff; color: white; justify-content: center; font-size: 1.1rem; margin-top: 15px;}
        .rebirth-btn:hover:not(:disabled) { background: #882ec7; }

        .section-title { 
            margin: 20px 0 10px 0; 
            color: #a8a8b3; 
            text-align: left; 
            font-size: 1.1rem;
            border-bottom: 1px solid #29292e;
            padding-bottom: 5px;
        }
        
        .danger-btn {
            background: transparent; color: #ff3344; border: 1px solid #3d1418;
            font-size: 0.85rem; padding: 6px; margin: 25px 0; justify-content: center; width: auto; display: inline-flex;
        }
        .danger-btn:hover { background: #3d1418; }

        /* FIXED UN-SCROLLABLE BOTTOM FOOTER BRANDING */
        .fixed-footer {
            background: #121214;
            padding: 15px 0;
            border-top: 2px solid #29292e;
            color: #8f8f98;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 0.8px;
            text-align: center;
            width: 100%;
        }
        .fixed-footer span {
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }
    </style>
</head>
<body>

    <div class="app-window">
        
        <!-- Header Panel: Stays dynamic but stuck on top -->
        <div class="header-panel">
            <h1>Neon Tycoon 2.5</h1>
            <div class="tagline">Advanced Clicks & Infinite Multipliers</div>
            
            <div class="dashboard">
                <div class="stat-box full">
                    <div class="stat">$<span id="cash-display">0</span></div>
                    <div class="stat-lbl">Available Cash</div>
                </div>
                <div class="stat-box">
                    <div class="sub-stat">+$<span id="income-display">0</span>/s</div>
                    <div class="stat-lbl">Auto Income</div>
                </div>
                <div class="stat-box">
                    <div class="rebirth-stat">x<span id="multiplier-display">1</span></div>
                    <div class="stat-lbl">Rebirth Multiplier</div>
                </div>
            </div>
        </div>

        <!-- Scrollable Center Panel: Only upgrades scroll up and down -->
        <div class="scrollable-content">
            
            <button class="click-btn" onclick="clickGain()">
                ⚡ Click to Earn (+$<span id="click-val-display">1</span>)
            </button>

            <!-- Expanded Manual Click Upgrades Section -->
            <div class="section-title">Manual Click Upgrades</div>
            
            <button id="click1-btn" onclick="buyClickUpgrade('click1')">
                <span>👆 Plastic Mouse (+2 per click)</span>
                <span id="click1-cost">$25</span>
            </button>
            
            <button id="click2-btn" onclick="buyClickUpgrade('click2')">
                <span>⚡ Copper Wiring (+15 per click)</span>
                <span id="click2-cost">$200</span>
            </button>

            <button id="click3-btn" onclick="buyClickUpgrade('click3')">
                <span>🔋 Kinetic Battery (+110 per click)</span>
                <span id="click3-cost">$1,500</span>
            </button>

            <button id="click4-btn" onclick="buyClickUpgrade('click4')">
                <span>🧠 Neural Link (+850 per click)</span>
                <span id="click4-cost">$12,000</span>
            </button>

            <button id="click5-btn" onclick="buyClickUpgrade('click5')">
                <span>🌌 Quantum Hand (+6,500 per click)</span>
                <span id="click5-cost">$95,000</span>
            </button>

            <!-- Automatic Income Section -->
            <div class="section-title">Automatic Industrial Droppers</div>
            
            <button id="dropper1-btn" onclick="buyAsset('dropper1')">
                <span>🏗️ Basic Dropper (<span id="d1-inc"></span>/s)</span>
                <span id="dropper1-cost">$15</span>
            </button>
            
            <button id="dropper2-btn" onclick="buyAsset('dropper2')">
                <span>🚀 Plasma Dropper (<span id="d2-inc"></span>/s)</span>
                <span id="dropper2-cost">$150</span>
            </button>

            <button id="dropper3-btn" onclick="buyAsset('dropper3')">
                <span>🌌 Quantum Core (<span id="d3-inc"></span>/s)</span>
                <span id="dropper3-cost">$1,200</span>
            </button>

            <button id="dropper4-btn" onclick="buyAsset('dropper4')">
                <span>🔮 Cyber Matrix (<span id="d4-inc"></span>/s)</span>
                <span id="dropper4-cost">$12,500</span>
            </button>

            <button id="dropper5-btn" onclick="buyAsset('dropper5')">
                <span>🧬 Antimatter Forge (<span id="d5-inc"></span>/s)</span>
                <span id="dropper5-cost">$140,000</span>
            </button>

            <button id="dropper6-btn" onclick="buyAsset('dropper6')">
                <span>👑 Singularity Engine (<span id="d6-inc"></span>/s)</span>
                <span id="dropper6-cost">$1,500,000</span>
            </button>

            <!-- Prestige Reset Section -->
            <div class="section-title">Prestige Reset</div>
            <button id="rebirth-btn" class="rebirth-btn" onclick="triggerRebirth()">
                <span>✨ Rebirth (Requires $<span id="rebirth-cost-display">10,000,000</span>)</span>
            </button>

            <center>
                <button class="danger-btn" onclick="resetGame()">Wipe Save Profile</button>
            </center>
        </div>

        <!-- Pinned Bottom Panel: Stays visible 100% of the time, no matter what -->
        <div class="fixed-footer">
            Made By <span>Yhonatan Akiva</span>
        </div>

    </div>

    <script>
        // Game configuration objects
        const dropperConfigs = {
            dropper1: { baseCost: 15, incomeVal: 1, scale: 1.35 },
            dropper2: { baseCost: 150, incomeVal: 8, scale: 1.38 },
            dropper3: { baseCost: 1200, incomeVal: 70, scale: 1.4 },
            dropper4: { baseCost: 12500, incomeVal: 620, scale: 1.42 },
            dropper5: { baseCost: 140000, incomeVal: 5300, scale: 1.45 },
            dropper6: { baseCost: 1500000, incomeVal: 48000, scale: 1.5 }
        };

        const clickConfigs = {
            click1: { baseCost: 25, addVal: 2, scale: 1.4 },
            click2: { baseCost: 200, addVal: 15, scale: 1.45 },
            click3: { baseCost: 1500, addVal: 110, scale: 1.5 },
            click4: { baseCost: 12000, addVal: 850, scale: 1.55 },
            click5: { baseCost: 95000, addVal: 6500, scale: 1.6 }
        };

        // Reactive Application State
        let gameData = {
            cash: 0,
            income: 0,
            rebirths: 0,
            clicksOwned: { click1: 0, click2: 0, click3: 0, click4: 0, click5: 0 },
            owned: { dropper1: 0, dropper2: 0, dropper3: 0, dropper4: 0, dropper5: 0, dropper6: 0 }
        };

        // Calculations & Scaling logic
        function getRebirthMultiplier() {
            return 1 + (gameData.rebirths * 1.5); // +150% boost per Rebirth
        }

        function getRebirthCost() {
            return Math.floor(10000000 * Math.pow(4, gameData.rebirths));
        }

        function getClickPower() {
            let baseClick = 1;
            for(let key in clickConfigs) {
                baseClick += gameData.clicksOwned[key] * clickConfigs[key].addVal;
            }
            // Dynamic bonus: Clicking gets a passive structural bonus equal to 5% of automatic income values!
            return baseClick + Math.floor(gameData.income * 0.05); 
        }

        function getClickCost(type) {
            let conf = clickConfigs[type];
            return Math.floor(conf.baseCost * Math.pow(conf.scale, gameData.clicksOwned[type]));
        }

        function getDropperCost(type) {
            let conf = dropperConfigs[type];
            return Math.floor(conf.baseCost * Math.pow(conf.scale, gameData.owned[type]));
        }

        function recalculateIncome() {
            let baseTotal = 0;
            for (let key in dropperConfigs) {
                baseTotal += gameData.owned[key] * dropperConfigs[key].incomeVal;
            }
            gameData.income = baseTotal * getRebirthMultiplier();
        }

        // Interface synchronization
        function updateUI() {
            let mult = getRebirthMultiplier();
            
            document.getElementById('cash-display').innerText = Math.floor(gameData.cash).toLocaleString();
            document.getElementById('income-display').innerText = Math.floor(gameData.income).toLocaleString();
            document.getElementById('multiplier-display').innerText = mult.toFixed(1);
            document.getElementById('click-val-display').innerText = getClickPower().toLocaleString();

            // Click Upgrades processing
            for(let key in clickConfigs) {
                let currentCost = getClickCost(key);
                document.getElementById(`${key}-cost`).innerText = `$${currentCost.toLocaleString()}`;
                document.getElementById(`${key}-btn`).disabled = gameData.cash < currentCost;
            }

            // Automatics Processing
            for (let key in dropperConfigs) {
                let currentCost = getDropperCost(key);
                let displayedIncome = Math.floor(dropperConfigs[key].incomeVal * mult);
                
                document.getElementById(`${key}-cost`).innerText = `$${currentCost.toLocaleString()}`;
                
                let shorthand = key === 'dropper1' ? 'd1' : key === 'dropper2' ? 'd2' : key === 'dropper3' ? 'd3' : key === 'dropper4' ? 'd4' : key === 'dropper5' ? 'd5' : 'd6';
                document.getElementById(`${shorthand}-inc`).innerText = `+${displayedIncome.toLocaleString()}`;
                
                document.getElementById(`${key}-btn`).disabled = gameData.cash < currentCost;
            }

            // Rebirth updates
            let rCost = getRebirthCost();
            document.getElementById('rebirth-cost-display').innerText = rCost.toLocaleString();
            document.getElementById('rebirth-btn').disabled = gameData.cash < rCost;
        }

        // Click actions
        function clickGain() {
            gameData.cash += getClickPower();
            updateUI();
        }

        function buyClickUpgrade(type) {
            let cost = getClickCost(type);
            if (gameData.cash >= cost) {
                gameData.cash -= cost;
                gameData.clicksOwned[type]++;
                updateUI();
                saveGame();
            }
        }

        function buyAsset(type) {
            let cost = getDropperCost(type);
            if (gameData.cash >= cost) {
                gameData.cash -= cost;
                gameData.owned[type]++;
                recalculateIncome();
                updateUI();
                saveGame();
            }
        }

        function triggerRebirth() {
            let cost = getRebirthCost();
            if (gameData.cash >= cost) {
                gameData.cash = 0;
                gameData.rebirths++;
                
                // Reset standard upgrades on rebirth
                for (let key in gameData.owned) gameData.owned[key] = 0;
                for (let key in gameData.clicksOwned) gameData.clicksOwned[key] = 0;
                
                recalculateIncome();
                updateUI();
                saveGame();
                alert("✨ Rebirth successful! Yield multipliers have broken limits!");
            }
        }

        // Storage operations
        function saveGame() {
            localStorage.setItem('neon_tycoon_v3_save', JSON.stringify(gameData));
        }

        function loadGame() {
            let saved = localStorage.getItem('neon_tycoon_v3_save');
            if (saved) {
                try {
                    let parsed = JSON.parse(saved);
                    if (typeof parsed.cash === 'number') gameData.cash = parsed.cash;
                    if (typeof parsed.rebirths === 'number') gameData.rebirths = parsed.rebirths;
                    if (parsed.owned) gameData.owned = { ...gameData.owned, ...parsed.owned };
                    if (parsed.clicksOwned) gameData.clicksOwned = { ...gameData.clicksOwned, ...parsed.clicksOwned };
                    recalculateIncome();
                } catch(e) {
                    console.error("Save load engine breakdown.", e);
                }
            }
            updateUI();
        }

        function resetGame() {
            if (confirm("Reset everything permanently? You will lose all stats.")) {
                localStorage.removeItem('neon_tycoon_v3_save');
                location.reload();
            }
        }

        // App Loops setup
        setInterval(function() {
            gameData.cash += (gameData.income / 10);
            updateUI();
        }, 100);

        setInterval(saveGame, 15000);
        window.onload = loadGame;
    </script>
</body>
</html>
