<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Tycoon: Cosmic Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --panel-bg: rgba(20, 22, 37, 0.6);
            --primary-neon: #00f0ff;
            --secondary-neon: #ff007f;
            --text-color: #ffffff;
            --text-muted: #8fa0dd;
            --border-color: rgba(0, 240, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Rubik', 'Orbitron', sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            direction: ltr;
        }

        /* אפקט רעידת מסך */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shaking {
            animation: shake 0.15s infinite;
        }

        /* פלאש כתום ברקע של ה-Overdrive */
        @keyframes orangePulse {
            0% { background-color: rgba(255, 100, 0, 0.15); }
            50% { background-color: rgba(255, 60, 0, 0.35); }
            100% { background-color: rgba(255, 100, 0, 0.15); }
        }

        .overdrive-bg {
            animation: orangePulse 0.6s infinite ease-in-out;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: radial-gradient(circle at center, #14172e 0%, #0a0b10 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ui-element {
            position: relative;
            z-index: 2;
        }

        /* כותרת עליונה */
        .header {
            text-align: center;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 5px 0;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .creator-tag {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* תצוגת סטטוס וכסף */
        .stats-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
            margin-top: 15px;
        }

        .cash-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px var(--primary-neon);
            margin-bottom: 5px;
        }

        .lps-display {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* כפתור הטרמינל הראשי */
        .terminal-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .main-terminal {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1d36 0%, #0c0e1a 100%);
            border: 4px solid var(--primary-neon);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.2);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.05s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .main-terminal:active {
            transform: scale(0.94);
            box-shadow: 0 0 40px var(--secondary-neon), inset 0 0 20px rgba(255, 0, 127, 0.4);
            border-color: var(--secondary-neon);
        }

        .terminal-icon {
            font-size: 40px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--primary-neon);
        }

        .terminal-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
        }

        /* חנות שדרוגים */
        .upgrades-container {
            max-height: 250px;
            overflow-y: auto;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 10px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
        }

        .upgrades-container::-webkit-scrollbar {
            width: 6px;
        }
        .upgrades-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .upgrade-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .upgrade-card:hover {
            background: rgba(0, 240, 255, 0.05);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .upgrade-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .upgrade-stats {
            font-size: 12px;
            color: var(--text-muted);
        }

        .upgrade-cost {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #ffb800;
        }

        /* כפתור ריברס / תפריט */
        .footer-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Rubik', sans-serif;
            font-size: 13px;
        }

        .btn:hover {
            background: var(--secondary-neon);
            border-color: var(--secondary-neon);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        /* מספרים צפים בלחיצה */
        .floating-text {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-neon);
            pointer-events: none;
            z-index: 10;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0.8); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas-bg"></canvas>

        <div class="header ui-element">
            <h1 class="game-title">CYBER TYCOON</h1>
            <div class="creator-tag">Made By Yhonatan Akiva</div>
        </div>

        <div class="stats-panel ui-element">
            <div class="cash-display" id="cash-text">$0</div>
            <div class="lps-display" id="lps-text">LPS: +0 / sec</div>
        </div>

        <div class="terminal-wrapper ui-element">
            <div class="main-terminal" id="click-terminal">
                <div class="terminal-icon">💻</div>
                <div class="terminal-text">TAP SYSTEM</div>
            </div>
        </div>

        <div class="upgrades-container ui-element" id="upgrades-list">
            </div>

        <div class="footer-actions ui-element">
            <button class="btn" id="rebirth-btn">System Reset (Rebirth)</button>
        </div>
    </div>

    <script>
        // --- מערכת ניהול דאטה ומצב משחק ---
        let state = {
            cash: 0,
            lps: 0,
            clickPower: 1,
            rebirths: 0,
            isOverdrive: false,
            overdriveMultiplier: 1
        };

        const upgradesConfig = [
            { id: 'item1', name: 'Quantum Mouse', cost: 15, lps: 0.5, count: 0 },
            { id: 'item2', name: 'Copper Core Link', cost: 100, lps: 4, count: 0 },
            { id: 'item3', name: 'Auto Dropper v1', cost: 1100, lps: 32, count: 0 },
            { id: 'item4', name: 'Antimatter Processor', cost: 12000, lps: 260, count: 0 },
            { id: 'item5', name: 'Cyber Net Grid', cost: 130000, lps: 1400, count: 0 }
        ];

        // אלמנטים ב-DOM
        const container = document.getElementById('game-container');
        const cashText = document.getElementById('cash-text');
        const lpsText = document.getElementById('lps-text');
        const terminal = document.getElementById('click-terminal');
        const upgradesList = document.getElementById('upgrades-list');
        const rebirthBtn = document.getElementById('rebirth-btn');
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');

        // התאמת גודל קנבס
        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- מנוע ה-Overdrive: חלליות, מטאורים, פלאש ורעידות ---
        let entities = [];

        function spawnEntity(type) {
            if (type === 'meteor') {
                entities.push({
                    type: 'meteor',
                    x: Math.random() * canvas.width * 1.5 - canvas.width * 0.5,
                    y: -50,
                    speed: Math.random() * 7 + 8,
                    size: Math.random() * 15 + 10,
                    angle: Math.PI / 4 + (Math.random() * 0.2 - 0.1) // זווית נפילה אלכסונית
                });
            } else if (type === 'spaceship') {
                entities.push({
                    type: 'spaceship',
                    x: Math.random() * canvas.width,
                    y: canvas.height + 50,
                    speed: Math.random() * 5 + 6,
                    size: Math.random() * 20 + 15
                });
            }
        }

        function updateAndRenderCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // עדכון וציור ישויות (רק כשה-Overdrive פעיל או שנשארו ישויות באוויר)
            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];

                if (e.type === 'meteor') {
                    // תנועת מטאור לכיוון מטה-ימינה
                    e.x += Math.cos(e.angle) * e.speed;
                    e.y += Math.sin(e.angle) * e.speed;

                    // ציור שובל האש של המטאור (כתום/אדום בוהק)
                    let gradient = ctx.createLinearGradient(e.x, e.y, e.x - Math.cos(e.angle)*40, e.y - Math.sin(e.angle)*40);
                    gradient.addColorStop(0, 'rgba(255, 200, 0, 1)');
                    gradient.addColorStop(0.3, 'rgba(255, 80, 0, 0.8)');
                    gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                    
                    ctx.beginPath();
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = e.size / 2;
                    ctx.moveTo(e.x, e.y);
                    ctx.lineTo(e.x - Math.cos(e.angle)*50, e.y - Math.sin(e.angle)*50);
                    ctx.stroke();

                    // ליבת המטאור
                    ctx.beginPath();
                    ctx.fillStyle = '#fff';
                    ctx.arc(e.x, e.y, e.size / 3, 0, Math.PI * 2);
                    ctx.fill();

                    // מחיקה אם יצא מהמסך
                    if (e.y > canvas.height + 50 || e.x > canvas.width + 50) entities.splice(i, 1);

                } else if (e.type === 'spaceship') {
                    // חלליות נופלות/טסות למטה במהירות
                    e.y -= e.speed;

                    // זנב מנוע פלזמה כחול/כתום
                    ctx.beginPath();
                    ctx.fillStyle = state.isOverdrive ? 'rgba(255, 100, 0, 0.7)' : 'rgba(0, 240, 255, 0.6)';
                    ctx.moveTo(e.x, e.y + e.size);
                    ctx.lineTo(e.x - e.size/4, e.y + e.size + 15);
                    ctx.lineTo(e.x + e.size/4, e.y + e.size + 15);
                    ctx.fill();

                    // גוף החללית (משולש סייבר עתידני)
                    ctx.beginPath();
                    ctx.fillStyle = '#e0e0e0';
                    ctx.moveTo(e.x, e.y);
                    ctx.lineTo(e.x - e.size / 2, e.y + e.size);
                    ctx.lineTo(e.x + e.size / 2, e.y + e.size);
                    ctx.closePath();
                    ctx.fill();

                    // מחיקה אם יצאה מלמעלה
                    if (e.y < -50) entities.splice(i, 1);
                }
            }

            requestAnimationFrame(updateAndRenderCanvas);
        }
        requestAnimationFrame(updateAndRenderCanvas);

        // הפעלת אירוע הטירוף הקוסמי (Overdrive Frenzy)
        function triggerOverdriveFrenzy() {
            if (state.isOverdrive) return; // מונע כפל אירועים

            state.isOverdrive = true;
            state.overdriveMultiplier = 5;
            
            // הפעלת רעידות מסך וצבע רקע כתום מהבהב בקוד ה-CSS
            container.classList.add('shaking', 'overdrive-bg');

            // לולאת יצירת חלליות ומטאורים בקצב מהיר
            let spawnInterval = setInterval(() => {
                if (!state.isOverdrive) {
                    clearInterval(spawnInterval);
                    return;
                }
                spawnEntity('meteor');
                spawnEntity('spaceship');
                spawnEntity('meteor');
            }, 100);

            // סיום האירוע אחרי 10 שניות
            setTimeout(() => {
                state.isOverdrive = false;
                state.overdriveMultiplier = 1;
                container.classList.remove('shaking', 'overdrive-bg');
            }, 10000);
        }

        // סיכוי רנדומלי של 5% להפעלת הטירוף בכל לחיצה בטרמינל
        function checkOverdriveChance() {
            if (!state.isOverdrive && Math.random() < 0.05) {
                triggerOverdriveFrenzy();
            }
        }

        // --- לוגיקת משחק רגילה ועדכוני UI ---
        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toFixed(1).replace('.0', '');
        }

        function updateUI() {
            cashText.innerText = '$' + formatNumber(state.cash);
            lpsText.innerText = `LPS: +${formatNumber(state.lps)} / sec` + (state.isOverdrive ? ' (5x FRENZY ACTIVE!)' : '');
            
            // עדכון עלויות שדרוגים בכפתורים
            upgradesConfig.forEach(upg => {
                const card = document.getElementById(`card-${upg.id}`);
                if (card) {
                    card.querySelector('.upgrade-cost').innerText = '$' + formatNumber(upg.cost);
                    card.querySelector('.upgrade-stats').innerText = `LPS: +${formatNumber(upg.lps)} | Own: ${upg.count}`;
                }
            });
        }

        function calculateLPS() {
            let totalLps = 0;
            upgradesConfig.forEach(upg => {
                totalLps += upg.lps * upg.count;
            });
            // הכפלת הריברס + תוספת ה-Overdrive
            state.lps = totalLps * (1 + state.rebirths) * state.overdriveMultiplier;
        }

        // יצירת חנות שדרוגים דינמית
        function buildUpgradeShop() {
            upgradesList.innerHTML = '';
            upgradesConfig.forEach(upg => {
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.id = `card-${upg.id}`;
                card.innerHTML = `
                    <div class="upgrade-info">
                        <div class="upgrade-name">${upg.name}</div>
                        <div class="upgrade-stats">LPS: +${upg.lps} | Own: ${upg.count}</div>
                    </div>
                    <div class="upgrade-cost">$${upg.cost}</div>
                `;
                
                card.addEventListener('click', () => {
                    if (state.cash >= upg.cost) {
                        state.cash -= upg.cost;
                        upg.count++;
                        upg.cost = Math.floor(upg.cost * 1.15); // הגדלת מחיר ב-15%
                        calculateLPS();
                        updateUI();
                    }
                });
                upgradesList.appendChild(card);
            });
        }

        // אפקט טקסט ומספר צף בלחיצה
        function createFloatingText(e, text) {
            const rect = terminal.getBoundingClientRect();
            const x = (e.clientX || rect.left + rect.width / 2) - container.getBoundingClientRect().left;
            const y = (e.clientY || rect.top + rect.height / 2) - container.getBoundingClientRect().top;

            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x - 15}px`;
            el.style.top = `${y - 20}px`;

            // צבע טקסט זהב במידה וזה במצב אוברדרייב
            if (state.isOverdrive) {
                el.style.color = '#ffaa00';
                el.style.textShadow = '0 0 10px #ff5500';
            }

            container.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // אירוע לחיצה על הטרמינל הראשי
        terminal.addEventListener('click', (e) => {
            let gained = state.clickPower * (1 + state.rebirths) * state.overdriveMultiplier;
            state.cash += gained;
            
            createFloatingText(e, `+$${formatNumber(gained)}`);
            checkOverdriveChance();
            updateUI();
        });

        // כפתור Rebirth
        rebirthBtn.addEventListener('click', () => {
            if (state.cash >= 100000) { // מחיר ריברס קבוע
                state.cash = 0;
                state.rebirths++;
                state.clickPower = 1 + state.rebirths;
                
                // איפוס שדרוגים
                upgradesConfig.forEach(upg => {
                    upg.count = 0;
                    if (upg.id === 'item1') upg.cost = 15;
                    if (upg.id === 'item2') upg.cost = 100;
                    if (upg.id === 'item3') upg.cost = 1100;
                    if (upg.id === 'item4') upg.cost = 12000;
                    if (upg.id === 'item5') upg.cost = 130000;
                });

                calculateLPS();
                buildUpgradeShop();
                updateUI();
                alert(`System Reset Complete! Welcome to Generation ${state.rebirths + 1}. Permanent multiplier increased!`);
            } else {
                alert("You need at least $100K to perform a System Reset!");
            }
        });

        // לולאת הפקת רווחים פסיביים (כל 100 מילישניות לחלק ב-10)
        setInterval(() => {
            if (state.lps > 0) {
                // חלוקה ב-10 כדי לתת תחושת זרימה רציפה וחלקלקה של הכסף שעולה
                state.cash += (state.lps / 10);
                updateUI();
            }
        }, 100);

        // אתחול ראשוני של המשחק
        buildUpgradeShop();
        updateUI();
    </script>
</body>
</html>
